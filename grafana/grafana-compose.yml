services:
  grafana:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?error}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:?error}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-"http://localhost:9000"}
      - PROMETHEUS_DATASOURCE_TIME_INTERVAL=${PROMETHEUS_DATASOURCE_TIME_INTERVAL:-"1s"}
    volumes:
      - grafana_data:/var/lib/grafana

  caddy_proxy:
    image: caddy:2.11.1-alpine
    restart: unless-stopped
    environment:
      - CADDY_PUBLIC_DOMAIN=${CADDY_PUBLIC_DOMAIN:?error}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  grafana_data:
  caddy_data:
  caddy_config:
