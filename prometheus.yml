global:
  scrape_interval: 5s
  scrape_timeout: 2s

scrape_configs:
  - job_name: 'network_traffic_metrics'
    static_configs:
      # "docker-host" is a name defined in compose.yml
      - targets: ['docker-host:8000']
  - job_name: 'blockchain_metrics'
    static_configs:
      # "blockchain-metrics-host" is a name defined in compose.yml
      - targets: ['blockchain-metrics-host:8001']

